# Concert 3 — Mission Initialization
# Creates the initial mission issue structure via workflow_dispatch.
# Used when initializing a mission from the GitHub UI.

name: "🎵 Concert Init"

on:
  workflow_dispatch:
    inputs:
      mission_name:
        description: "Mission name (e.g., 'auth-service', 'dashboard-redesign')"
        required: true
        type: string
      workflow:
        description: "Workflow size"
        required: true
        type: choice
        options:
          - full
          - medium
          - small
        default: full
      description:
        description: "Brief mission description"
        required: true
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  create-mission:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate mission slug
        id: slug
        run: |
          SLUG=$(echo "${{ inputs.mission_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=concert/$SLUG" >> "$GITHUB_OUTPUT"

      - name: Create mission branch
        run: |
          git checkout -b ${{ steps.slug.outputs.branch }}

      - name: Create mission directory and initial files
        run: |
          MISSION_DIR=".concert/missions/${{ steps.slug.outputs.slug }}"
          mkdir -p "$MISSION_DIR"

          # Create initial VISION.md placeholder
          cat > "$MISSION_DIR/VISION.md" << 'VISION_EOF'
          # Vision: ${{ inputs.mission_name }}

          > Generated by Concert 3 Init

          ## Problem Statement
          ${{ inputs.description }}

          ## Goals
          <!-- Fill in the specific goals for this mission -->

          ## Non-Goals
          <!-- What is explicitly out of scope -->

          ## Success Criteria
          <!-- How will we know this mission succeeded? -->

          ## Open Questions
          - [ ] Define specific success metrics
          - [ ] Identify stakeholders
          - [ ] Clarify scope boundaries
          VISION_EOF

          git config user.name "Concert Bot"
          git config user.email "concert@github.com"
          git add .
          git commit -m "concert: init mission ${{ steps.slug.outputs.slug }}"
          git push origin ${{ steps.slug.outputs.branch }}

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'concert/mission', color: '7B68EE', description: 'Concert mission parent issue' },
              { name: 'concert/vision-draft', color: 'FFA500', description: 'Vision ready for review' },
              { name: 'concert/vision-accepted', color: '32CD32', description: 'Vision approved' },
              { name: 'concert/requirements-pending', color: 'FFD700', description: 'Requirements being generated' },
              { name: 'concert/requirements-review', color: 'FFA500', description: 'Requirements ready for review' },
              { name: 'concert/requirements-accepted', color: '32CD32', description: 'Requirements approved' },
              { name: 'concert/architecture-pending', color: 'FFD700', description: 'Architecture being generated' },
              { name: 'concert/architecture-review', color: 'FFA500', description: 'Architecture ready for review' },
              { name: 'concert/architecture-accepted', color: '32CD32', description: 'Architecture approved' },
              { name: 'concert/ux-pending', color: 'FFD700', description: 'UX design being generated' },
              { name: 'concert/ux-review', color: 'FFA500', description: 'UX design ready for review' },
              { name: 'concert/ux-accepted', color: '32CD32', description: 'UX design approved' },
              { name: 'concert/planning-pending', color: 'FFD700', description: 'Task planning in progress' },
              { name: 'concert/planning-review', color: 'FFA500', description: 'Task plan ready for review' },
              { name: 'concert/planning-accepted', color: '32CD32', description: 'Task plan approved' },
              { name: 'concert/planning-ready', color: '32CD32', description: 'Ready for task planning' },
              { name: 'concert/execution', color: '1E90FF', description: 'Mission in execution phase' },
              { name: 'concert/task', color: '87CEEB', description: 'Coding task sub-issue' },
              { name: 'concert/task-review', color: 'DDA0DD', description: 'Task code review' },
              { name: 'concert/task-complete', color: '32CD32', description: 'Task completed and reviewed' },
              { name: 'concert/agent-work', color: '9370DB', description: 'Assigned to Copilot agent' },
              { name: 'concert/revision', color: 'FF6347', description: 'Revision requested' },
              { name: 'concert/fix', color: 'FF4500', description: 'Fix for review findings' },
              { name: 'concert/complete', color: '006400', description: 'Mission complete' },
              { name: 'concert/blocked', color: 'DC143C', description: 'Needs manual intervention' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              } catch (e) {
                if (e.status === 422) {
                  // Label already exists, update it
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                }
              }
            }

      - name: Create mission parent issue
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            const branch = '${{ steps.slug.outputs.branch }}';
            const workflow = '${{ inputs.workflow }}';
            const description = `${{ inputs.description }}`;

            const workflowStages = {
              full: ['Vision', 'Requirements', 'Architecture', 'UX Design', 'Planning', 'Execution', 'Verification'],
              medium: ['Vision', 'Requirements', 'Architecture', 'Planning', 'Execution'],
              small: ['Vision', 'Requirements', 'Planning', 'Execution'],
            };

            const stages = workflowStages[workflow];
            const stageChecklist = stages.map(s => `- [ ] ${s}`).join('\n');

            const body = `# 🎵 Mission: ${{ inputs.mission_name }}

            ${description}

            ## Pipeline Progress
            ${stageChecklist}

            ## Details
            | Field | Value |
            |-------|-------|
            | **Workflow** | ${workflow} |
            | **Branch** | \`${branch}\` |
            | **Slug** | ${slug} |

            ## Commands
            - \`/accept\` — Approve current stage and advance
            - \`/revise: <feedback>\` — Request changes to current stage

            <!-- concert-slug: ${slug} -->
            <!-- concert-branch: ${branch} -->
            <!-- concert-workflow: ${workflow} -->`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎵 Mission: ${{ inputs.mission_name }}`,
              body: body,
              labels: ['concert/mission', 'concert/vision-draft'],
            });

            // Create PR linking to the issue
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎵 ${slug}`,
              body: `Mission PR for #${issue.data.number}\n\nThis PR will accumulate all work for the **${{ inputs.mission_name }}** mission.`,
              head: branch,
              base: 'main',
              draft: true,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              body: `📄 Vision document created on branch \`${branch}\`.\n\n🔗 Draft PR: #${pr.data.number}\n\nPlease edit \`.concert/missions/${slug}/VISION.md\` with your vision, then comment \`/accept\` to begin the pipeline.`,
            });

            core.notice(`Mission created: Issue #${issue.data.number}, PR #${pr.data.number}`);
